name: 每日新闻推送

on:
  schedule:
    - cron: '0 0 * * *'    # 北京时间 08:00（早报）
    - cron: '0 4 * * *'    # 北京时间 12:00（午报）
    - cron: '0 10 * * *'   # 北京时间 18:00（晚报）
    - cron: '0 14 * * *'   # 北京时间 22:00（夜报）
  workflow_dispatch:       # 允许手动触发测试

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 requests 库
        run: pip install requests

      - name: 运行脚本（带重试）
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          for i in {1..3}; do
            python main.py && break
            echo "推送失败，重试 $i/3 次..."
            sleep 10
          done
